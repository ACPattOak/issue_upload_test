name: Import issues from CSV

on:
  push:
    branches:
      - main
    paths:
      - examples/issues.csv
  workflow_dispatch:
    inputs:
      csv_path:
        description: CSV file to import
        required: true
        default: examples/issues.csv
        type: string
      dry_run:
        description: Validate without creating issues
        required: true
        default: true
        type: boolean
      project_url:
        description: Optional Project URL; defaults to the PROJECT_URL repository variable
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: csv-issue-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Import issues
        env:
          CSV_PATH: ${{ inputs.csv_path || 'examples/issues.csv' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          GH_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_PAT }}
          PROJECT_URL: ${{ inputs.project_url || vars.PROJECT_URL }}
        run: |
          args=("$CSV_PATH" --repository "${{ github.repository }}")
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          python scripts/import_issues.py "${args[@]}"
